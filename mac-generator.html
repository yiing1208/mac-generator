<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAC Address Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  .badge {
    display: inline-block;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 11px;
    color: #58a6ff;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: monospace;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #f0f6fc;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 36px; }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  label .hint { color: #484f58; text-transform: none; margin-left: 6px; }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #58a6ff;
  }

  input[type="number"] { font-family: inherit; letter-spacing: normal; }

  .sep-group { display: flex; gap: 8px; padding-top: 4px; }

  .sep-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #8b949e;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    transition: all 0.15s;
  }

  .sep-btn.active {
    border-color: #58a6ff;
    background: #1f3a5f;
    color: #58a6ff;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .toggle {
    width: 40px; height: 22px;
    border-radius: 11px;
    border: none;
    background: #30363d;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on { background: #238636; }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 21px; }

  .toggle-label { font-size: 13px; color: #8b949e; }

  .error {
    background: #2d1117;
    border: 1px solid #f85149;
    border-radius: 6px;
    padding: 10px 14px;
    color: #f85149;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .btn-generate {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }

  .btn-generate:hover { opacity: 0.85; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #21262d;
  }

  .result-count { font-size: 13px; color: #8b949e; }
  .result-count span { color: #58a6ff; font-weight: 600; }

  .action-btns { display: flex; gap: 8px; }

  .btn-ghost {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: #58a6ff; color: #58a6ff; }

  .btn-primary {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: #238636;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.8; }

  .mac-list {
    max-height: 340px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .mac-list::-webkit-scrollbar { width: 6px; }
  .mac-list::-webkit-scrollbar-track { background: #161b22; }
  .mac-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .mac-row {
    display: flex;
    align-items: center;
    padding: 4px 20px;
    gap: 16px;
    transition: background 0.1s;
  }

  .mac-row:hover { background: #1c2128; }

  .mac-idx {
    width: 40px;
    text-align: right;
    color: #484f58;
    font-size: 11px;
    flex-shrink: 0;
    font-family: monospace;
  }

  .mac-addr {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #e6edf3;
    letter-spacing: 0.05em;
  }

  .more-note {
    padding: 8px 20px 8px 76px;
    color: #484f58;
    font-size: 12px;
  }

  #result-card { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="badge">Network Tool</div>
  <h1>MAC Address Generator</h1>
  <p class="subtitle">批量產生連續 MAC 位址並匯出 CSV</p>

  <div class="card">
    <div class="grid">
      <div>
        <label>OUI（前三組，代表廠商）<span class="hint">例：00:17:16</span></label>
        <input type="text" id="oui" value="00:17:16" placeholder="00:17:16" maxlength="8">
      </div>
      <div>
        <label>起始 NIC（後三組）<span class="hint">例：00:17:16</span></label>
        <input type="text" id="nic" value="00:17:16" placeholder="00:17:16" maxlength="8">
      </div>
      <div>
        <label>產生數量<span class="hint">1 ~ 10000</span></label>
        <input type="number" id="count" value="10" min="1" max="10000">
      </div>
      <div>
        <label>分隔符號</label>
        <div class="sep-group">
          <button class="sep-btn active" data-sep=":" onclick="setSep(this)">AA:BB:CC</button>
          <button class="sep-btn" data-sep="-" onclick="setSep(this)">AA-BB-CC</button>
          <button class="sep-btn" data-sep="" onclick="setSep(this)">AABBCC</button>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <button class="toggle on" id="caseToggle" onclick="toggleCase()"></button>
      <span class="toggle-label" id="caseLabel">大寫輸出（AA:BB:CC）</span>
    </div>

    <div class="error" id="error"></div>

    <button class="btn-generate" onclick="generate()">▶ 產生 MAC 位址</button>
  </div>

  <div class="card" id="result-card">
    <div class="result-header">
      <span class="result-count">已產生 <span id="result-count">0</span> 組 MAC</span>
      <div class="action-btns">
        <button class="btn-ghost" id="copyBtn" onclick="copyAll()">複製全部</button>
        <button class="btn-primary" onclick="downloadCSV()">↓ 下載 CSV</button>
      </div>
    </div>
    <div class="mac-list" id="mac-list"></div>
  </div>

</div>

<script>
  let currentSep = ':';
  let isUpper = true;
  let allMacs = [];

  function setSep(btn) {
    document.querySelectorAll('.sep-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSep = btn.dataset.sep;
  }

  function toggleCase() {
    isUpper = !isUpper;
    const btn = document.getElementById('caseToggle');
    const lbl = document.getElementById('caseLabel');
    btn.classList.toggle('on', isUpper);
    lbl.textContent = isUpper ? '大寫輸出（AA:BB:CC）' : '小寫輸出（aa:bb:cc）';
  }

  function parsePart(str) {
    return str.replace(/[:\-\s]/g, '').toUpperCase();
  }

  function padHex(n, len) {
    return n.toString(16).toUpperCase().padStart(len, '0');
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error').style.display = 'none';
  }

  function generate() {
    hideError();
    const ouiRaw = document.getElementById('oui').value.trim();
    const nicRaw = document.getElementById('nic').value.trim();
    const countVal = parseInt(document.getElementById('count').value, 10);

    const oui = parsePart(ouiRaw);
    const nic = parsePart(nicRaw);

    if (oui.length !== 6 || !/^[0-9A-Fa-f]{6}$/.test(oui)) {
      showError('OUI（前三組）必須是 3 bytes，例如 00:17:16'); return;
    }
    if (nic.length !== 6 || !/^[0-9A-Fa-f]{6}$/.test(nic)) {
      showError('起始 NIC（後三組）必須是 3 bytes，例如 00:17:16'); return;
    }
    if (isNaN(countVal) || countVal < 1 || countVal > 10000) {
      showError('數量請填 1 ~ 10000'); return;
    }

    const nicBase = parseInt(nic, 16);
    const maxNic = 0xFFFFFF;

    if (nicBase + countVal - 1 > maxNic) {
      showError(`起始值 + 數量超過 NIC 最大值，最多可再產生 ${maxNic - nicBase + 1} 組`); return;
    }

    allMacs = [];
    for (let i = 0; i < countVal; i++) {
      const nicHex = padHex(nicBase + i, 6);
      const full = oui + nicHex;
      const parts = [0,2,4,6,8,10].map(j => full.slice(j, j+2));
      let mac = parts.join(currentSep);
      allMacs.push(isUpper ? mac.toUpperCase() : mac.toLowerCase());
    }

    renderResults();
  }

  function renderResults() {
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('result-count').textContent = allMacs.length;

    const list = document.getElementById('mac-list');
    list.innerHTML = '';

    const preview = allMacs.slice(0, 200);
    preview.forEach((mac, i) => {
      const row = document.createElement('div');
      row.className = 'mac-row';
      row.innerHTML = `
        <span class="mac-idx">${i + 1}</span>
        <span class="mac-addr">${mac}</span>
      `;
      list.appendChild(row);
    });

    if (allMacs.length > 200) {
      const note = document.createElement('div');
      note.className = 'more-note';
      note.textContent = `… 僅顯示前 200 筆，下載 CSV 取得全部 ${allMacs.length} 筆`;
      list.appendChild(note);
    }

    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function downloadCSV() {
    if (!allMacs.length) return;
    const content = 'MAC Address\n' + allMacs.join('\n');
    const oui = parsePart(document.getElementById('oui').value);
    const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mac_${oui}_${allMacs.length}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function copyAll() {
    if (!allMacs.length) return;
    navigator.clipboard.writeText(allMacs.join('\n')).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ 已複製';
      setTimeout(() => btn.textContent = '複製全部', 2000);
    });
  }
</script>
</body>
</html>
