<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAC Address Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .badge {
    display: inline-block;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 11px;
    color: #58a6ff;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: monospace;
  }

  .lang-switcher { display: flex; gap: 4px; }

  .lang-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .lang-btn.active {
    border-color: #58a6ff;
    background: #1f3a5f;
    color: #58a6ff;
  }

  .lang-btn:hover:not(.active) { border-color: #58a6ff; color: #58a6ff; }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #f0f6fc;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 36px; }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  label .hint { color: #484f58; text-transform: none; margin-left: 6px; }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus { border-color: #58a6ff; }

  input[type="number"] { font-family: inherit; letter-spacing: normal; }

  .sep-group { display: flex; gap: 8px; padding-top: 4px; }

  .sep-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #8b949e;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    transition: all 0.15s;
  }

  .sep-btn.active {
    border-color: #58a6ff;
    background: #1f3a5f;
    color: #58a6ff;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .toggle {
    width: 40px; height: 22px;
    border-radius: 11px;
    border: none;
    background: #30363d;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on { background: #238636; }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 21px; }

  .toggle-label { font-size: 13px; color: #8b949e; }

  .error {
    background: #2d1117;
    border: 1px solid #f85149;
    border-radius: 6px;
    padding: 10px 14px;
    color: #f85149;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .btn-generate {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }

  .btn-generate:hover { opacity: 0.85; }

  .btn-reset {
    padding: 12px 18px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-reset:hover { border-color: #58a6ff; color: #58a6ff; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #21262d;
  }

  .result-count { font-size: 13px; color: #8b949e; }
  .result-count span { color: #58a6ff; font-weight: 600; }

  .action-btns { display: flex; gap: 8px; }

  .btn-ghost {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: #58a6ff; color: #58a6ff; }

  .btn-primary {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: #238636;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.8; }

  .mac-list {
    max-height: 340px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .mac-list::-webkit-scrollbar { width: 6px; }
  .mac-list::-webkit-scrollbar-track { background: #161b22; }
  .mac-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .mac-row {
    display: flex;
    align-items: center;
    padding: 4px 20px;
    gap: 16px;
    transition: background 0.1s;
  }

  .mac-row:hover { background: #1c2128; }

  .mac-idx {
    width: 40px;
    text-align: right;
    color: #484f58;
    font-size: 11px;
    flex-shrink: 0;
    font-family: monospace;
  }

  .mac-addr {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #e6edf3;
    letter-spacing: 0.05em;
  }

  .more-note {
    padding: 8px 20px 8px 76px;
    color: #484f58;
    font-size: 12px;
  }

  #result-card { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="header-row">
    <div class="badge">Network Tool</div>
    <div class="lang-switcher">
      <button class="lang-btn" id="lang-zhTW" onclick="setLang('zh-TW')">中文</button>
      <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <h1>MAC Address Generator</h1>
  <p class="subtitle" id="subtitle">Generate sequential MAC addresses and export as CSV</p>

  <div class="card">
    <div class="grid">
      <div>
        <label><span id="oui-label-text">OUI (First 3 octets, vendor)</span><span class="hint" id="oui-hint">e.g. 00:00:00</span></label>
        <input type="text" id="oui" value="00:00:00" placeholder="00:00:00" maxlength="8">
      </div>
      <div>
        <label><span id="nic-label-text">Start NIC (Last 3 octets)</span><span class="hint" id="nic-hint">e.g. 00:00:00</span></label>
        <input type="text" id="nic" value="00:00:00" placeholder="00:00:00" maxlength="8">
      </div>
      <div>
        <label><span id="count-label-text">Count</span><span class="hint">1 ~ 10000</span></label>
        <input type="number" id="count" value="10" min="1" max="10000">
      </div>
      <div>
        <label id="sep-label-text">Separator</label>
        <div class="sep-group">
          <button class="sep-btn active" data-sep=":" onclick="setSep(this)">AA:BB:CC</button>
          <button class="sep-btn" data-sep="-" onclick="setSep(this)">AA-BB-CC</button>
          <button class="sep-btn" data-sep="" onclick="setSep(this)">AABBCC</button>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <button class="toggle on" id="caseToggle" onclick="toggleCase()"></button>
      <span class="toggle-label" id="caseLabel">Uppercase (AA:BB:CC)</span>
    </div>

    <div class="error" id="error"></div>

    <div style="display:flex;gap:10px;">
      <button class="btn-generate" id="btn-generate" onclick="generate()">▶ Generate MAC</button>
      <button class="btn-reset" id="btn-reset" onclick="resetToDefault()">↺ Reset</button>
    </div>
  </div>

  <div class="card" id="result-card">
    <div class="result-header">
      <span class="result-count" id="result-count-wrap">Generated <span id="result-count">0</span> MACs</span>
      <div class="action-btns">
        <button class="btn-ghost" id="copyBtn" onclick="copyAll()">Copy All</button>
        <button class="btn-primary" id="btn-download" onclick="downloadCSV()">↓ Download CSV</button>
      </div>
    </div>
    <div class="mac-list" id="mac-list"></div>
  </div>

</div>

<script>
  let currentSep = ':';
  let isUpper = true;
  let allMacs = [];
  let currentLang = 'en';

  const i18n = {
    'zh-TW': {
      subtitle:      '批量產生連續 MAC 位址並匯出 CSV',
      oui_label:     'OUI（前三組，代表廠商）',
      nic_label:     '起始 NIC（後三組）',
      hint_eg:       '例：00:00:00',
      count_label:   '產生數量',
      sep_label:     '分隔符號',
      case_upper:    '大寫輸出（AA:BB:CC）',
      case_lower:    '小寫輸出（aa:bb:cc）',
      btn_generate:  '▶ 產生 MAC 位址',
      btn_reset:     '↺ 回復初始值',
      btn_copy:      '複製全部',
      btn_copied:    '✓ 已複製',
      btn_download:  '↓ 下載 CSV',
      result_count:  (n) => `已產生 <span id="result-count">${n}</span> 組 MAC`,
      more_note:     (n) => `… 僅顯示前 200 筆，下載 CSV 取得全部 ${n} 筆`,
      err_oui:       'OUI（前三組）必須是 3 bytes，例如 00:00:00',
      err_nic:       '起始 NIC（後三組）必須是 3 bytes，例如 00:00:00',
      err_count:     '數量請填 1 ~ 10000',
      err_overflow:  (n) => `起始值 + 數量超過 NIC 最大值，最多可再產生 ${n} 組`,
    },
    'en': {
      subtitle:      'Generate sequential MAC addresses and export as CSV',
      oui_label:     'OUI (First 3 octets, vendor)',
      nic_label:     'Start NIC (Last 3 octets)',
      hint_eg:       'e.g. 00:00:00',
      count_label:   'Count',
      sep_label:     'Separator',
      case_upper:    'Uppercase (AA:BB:CC)',
      case_lower:    'Lowercase (aa:bb:cc)',
      btn_generate:  '▶ Generate MAC',
      btn_reset:     '↺ Reset',
      btn_copy:      'Copy All',
      btn_copied:    '✓ Copied',
      btn_download:  '↓ Download CSV',
      result_count:  (n) => `Generated <span id="result-count">${n}</span> MACs`,
      more_note:     (n) => `… Showing first 200. Download CSV for all ${n} entries`,
      err_oui:       'OUI (first 3 octets) must be 3 bytes, e.g. 00:00:00',
      err_nic:       'Start NIC (last 3 octets) must be 3 bytes, e.g. 00:00:00',
      err_count:     'Count must be between 1 and 10000',
      err_overflow:  (n) => `Start + count exceeds NIC max. Up to ${n} entries can be generated`,
    }
  };

  function t() { return i18n[currentLang]; }

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;

    document.getElementById('lang-zhTW').classList.toggle('active', lang === 'zh-TW');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');

    const tr = t();
    document.getElementById('subtitle').textContent        = tr.subtitle;
    document.getElementById('oui-label-text').textContent  = tr.oui_label;
    document.getElementById('nic-label-text').textContent  = tr.nic_label;
    document.getElementById('oui-hint').textContent        = tr.hint_eg;
    document.getElementById('nic-hint').textContent        = tr.hint_eg;
    document.getElementById('count-label-text').textContent = tr.count_label;
    document.getElementById('sep-label-text').textContent  = tr.sep_label;
    document.getElementById('caseLabel').textContent       = isUpper ? tr.case_upper : tr.case_lower;
    document.getElementById('btn-generate').textContent    = tr.btn_generate;
    document.getElementById('btn-reset').textContent       = tr.btn_reset;
    document.getElementById('copyBtn').textContent         = tr.btn_copy;
    document.getElementById('btn-download').textContent    = tr.btn_download;

    if (allMacs.length > 0) {
      document.getElementById('result-count-wrap').innerHTML = tr.result_count(allMacs.length);
      const moreNote = document.querySelector('.more-note');
      if (moreNote) moreNote.textContent = tr.more_note(allMacs.length);
    }
  }

  function setSep(btn) {
    document.querySelectorAll('.sep-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSep = btn.dataset.sep;
  }

  function toggleCase() {
    isUpper = !isUpper;
    document.getElementById('caseToggle').classList.toggle('on', isUpper);
    document.getElementById('caseLabel').textContent = isUpper ? t().case_upper : t().case_lower;
  }

  function parsePart(str) {
    return str.replace(/[:\-\s]/g, '').toUpperCase();
  }

  function padHex(n, len) {
    return n.toString(16).toUpperCase().padStart(len, '0');
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error').style.display = 'none';
  }

  function generate() {
    hideError();
    const ouiRaw  = document.getElementById('oui').value.trim();
    const nicRaw  = document.getElementById('nic').value.trim();
    const countVal = parseInt(document.getElementById('count').value, 10);
    const tr = t();

    const oui = parsePart(ouiRaw);
    const nic = parsePart(nicRaw);

    if (oui.length !== 6 || !/^[0-9A-Fa-f]{6}$/.test(oui)) {
      showError(tr.err_oui); return;
    }
    if (nic.length !== 6 || !/^[0-9A-Fa-f]{6}$/.test(nic)) {
      showError(tr.err_nic); return;
    }
    if (isNaN(countVal) || countVal < 1 || countVal > 10000) {
      showError(tr.err_count); return;
    }

    const nicBase = parseInt(nic, 16);
    const maxNic  = 0xFFFFFF;

    if (nicBase + countVal - 1 > maxNic) {
      showError(tr.err_overflow(maxNic - nicBase + 1)); return;
    }

    allMacs = [];
    for (let i = 0; i < countVal; i++) {
      const nicHex = padHex(nicBase + i, 6);
      const full   = oui + nicHex;
      const parts  = [0,2,4,6,8,10].map(j => full.slice(j, j+2));
      let mac = parts.join(currentSep);
      allMacs.push(isUpper ? mac.toUpperCase() : mac.toLowerCase());
    }

    renderResults();
  }

  function renderResults() {
    const tr = t();
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('result-count-wrap').innerHTML = tr.result_count(allMacs.length);

    const list = document.getElementById('mac-list');
    list.innerHTML = '';

    allMacs.slice(0, 200).forEach((mac, i) => {
      const row = document.createElement('div');
      row.className = 'mac-row';
      row.innerHTML = `<span class="mac-idx">${i + 1}</span><span class="mac-addr">${mac}</span>`;
      list.appendChild(row);
    });

    if (allMacs.length > 200) {
      const note = document.createElement('div');
      note.className = 'more-note';
      note.textContent = tr.more_note(allMacs.length);
      list.appendChild(note);
    }

    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function downloadCSV() {
    if (!allMacs.length) return;
    const oui     = parsePart(document.getElementById('oui').value);
    const content = 'MAC Address\n' + allMacs.join('\n');
    const blob    = new Blob([content], { type: 'text/csv;charset=utf-8;' });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    a.href = url;
    a.download = `mac_${oui}_${allMacs.length}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function resetToDefault() {
    document.getElementById('oui').value      = '00:00:00';
    document.getElementById('nic').value      = '00:00:00';
    document.getElementById('oui-hint').textContent = t().hint_eg;
    document.getElementById('nic-hint').textContent = t().hint_eg;
    hideError();
  }

  function copyAll() {
    if (!allMacs.length) return;
    const tr = t();
    navigator.clipboard.writeText(allMacs.join('\n')).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = tr.btn_copied;
      setTimeout(() => btn.textContent = tr.btn_copy, 2000);
    });
  }
</script>

<div style="pointer-events:none;position:fixed;top:0;left:0;z-index:50;width:100%;height:100%;">
  <canvas id="fluid" style="display:block;width:100vw;height:100vh;"></canvas>
</div>

<script>
(function () {
  const canvas = document.getElementById('fluid');
  if (!canvas) return;

  const pointers = [pointerPrototype()];
  const config = {
    SIM_RESOLUTION: 128,
    DYE_RESOLUTION: 1440,
    DENSITY_DISSIPATION: 3.5,
    VELOCITY_DISSIPATION: 2,
    PRESSURE: 0.1,
    PRESSURE_ITERATIONS: 20,
    CURL: 3,
    SPLAT_RADIUS: 0.2,
    SPLAT_FORCE: 6000,
    SHADING: true,
    COLOR_UPDATE_SPEED: 10,
  };

  function pointerPrototype() {
    return { id: -1, texcoordX: 0, texcoordY: 0, prevTexcoordX: 0, prevTexcoordY: 0, deltaX: 0, deltaY: 0, down: false, moved: false, color: { r: 0, g: 0, b: 0 } };
  }

  const { gl, ext } = getWebGLContext(canvas);
  if (!gl || !ext) return;
  if (!ext.supportLinearFiltering) { config.DYE_RESOLUTION = 256; config.SHADING = false; }

  function getWebGLContext(canvas) {
    const params = { alpha: true, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };
    let gl = canvas.getContext('webgl2', params);
    if (!gl) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);
    if (!gl) return { gl: null, ext: null };
    const isWebGL2 = 'drawBuffers' in gl;
    let supportLinearFiltering = false, halfFloat = null;
    if (isWebGL2) {
      gl.getExtension('EXT_color_buffer_float');
      supportLinearFiltering = !!gl.getExtension('OES_texture_float_linear');
    } else {
      halfFloat = gl.getExtension('OES_texture_half_float');
      supportLinearFiltering = !!gl.getExtension('OES_texture_half_float_linear');
    }
    gl.clearColor(0, 0, 0, 1);
    const halfFloatTexType = isWebGL2 ? gl.HALF_FLOAT : (halfFloat && halfFloat.HALF_FLOAT_OES) || 0;
    let formatRGBA, formatRG, formatR;
    if (isWebGL2) {
      formatRGBA = getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, halfFloatTexType);
      formatRG   = getSupportedFormat(gl, gl.RG16F,   gl.RG,   halfFloatTexType);
      formatR    = getSupportedFormat(gl, gl.R16F,    gl.RED,  halfFloatTexType);
    } else {
      formatRGBA = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
      formatRG   = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
      formatR    = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
    }
    return { gl, ext: { formatRGBA, formatRG, formatR, halfFloatTexType, supportLinearFiltering } };
  }

  function getSupportedFormat(gl, internalFormat, format, type) {
    if (!supportRenderTextureFormat(gl, internalFormat, format, type)) {
      if ('drawBuffers' in gl) {
        switch (internalFormat) {
          case gl.R16F:  return getSupportedFormat(gl, gl.RG16F,   gl.RG,   type);
          case gl.RG16F: return getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, type);
          default:       return null;
        }
      }
      return null;
    }
    return { internalFormat, format };
  }

  function supportRenderTextureFormat(gl, internalFormat, format, type) {
    const texture = gl.createTexture();
    if (!texture) return false;
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
    const fbo = gl.createFramebuffer();
    if (!fbo) return false;
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
    return gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  }

  function hashCode(s) {
    let hash = 0;
    for (let i = 0; i < s.length; i++) { hash = (hash << 5) - hash + s.charCodeAt(i); hash |= 0; }
    return hash;
  }

  function compileShader(type, source, keywords) {
    if (keywords) source = keywords.map(k => `#define ${k}`).join('\n') + '\n' + source;
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
  }

  function createProgram(vs, fs) {
    const program = gl.createProgram();
    gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program);
    return program;
  }

  function getUniforms(program) {
    const uniforms = {}, n = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < n; i++) { const u = gl.getActiveUniform(program, i); if (u) uniforms[u.name] = gl.getUniformLocation(program, u.name); }
    return uniforms;
  }

  class Program {
    constructor(vs, fs) { this.program = createProgram(vs, fs); this.uniforms = getUniforms(this.program); }
    bind() { gl.useProgram(this.program); }
  }

  class Material {
    constructor(vs, fsSrc) { this.vs = vs; this.fsSrc = fsSrc; this.programs = {}; this.activeProgram = null; this.uniforms = {}; }
    setKeywords(keywords) {
      let hash = keywords.reduce((h, k) => h + hashCode(k), 0);
      if (!this.programs[hash]) {
        const fs = compileShader(gl.FRAGMENT_SHADER, this.fsSrc, keywords);
        this.programs[hash] = createProgram(this.vs, fs);
      }
      if (this.programs[hash] === this.activeProgram) return;
      this.activeProgram = this.programs[hash];
      this.uniforms = getUniforms(this.activeProgram);
    }
    bind() { gl.useProgram(this.activeProgram); }
  }

  const baseVS = compileShader(gl.VERTEX_SHADER, `
    precision highp float;
    attribute vec2 aPosition;
    varying vec2 vUv, vL, vR, vT, vB;
    uniform vec2 texelSize;
    void main () {
      vUv = aPosition * 0.5 + 0.5;
      vL = vUv - vec2(texelSize.x, 0.0); vR = vUv + vec2(texelSize.x, 0.0);
      vT = vUv + vec2(0.0, texelSize.y); vB = vUv - vec2(0.0, texelSize.y);
      gl_Position = vec4(aPosition, 0.0, 1.0);
    }`);

  const copyFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv; uniform sampler2D uTexture;
    void main () { gl_FragColor = texture2D(uTexture, vUv); }`);

  const clearFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv; uniform sampler2D uTexture; uniform float value;
    void main () { gl_FragColor = value * texture2D(uTexture, vUv); }`);

  const displayFSSrc = `
    precision highp float; precision highp sampler2D;
    varying vec2 vUv, vL, vR, vT, vB;
    uniform sampler2D uTexture; uniform vec2 texelSize;
    void main () {
      vec3 c = texture2D(uTexture, vUv).rgb;
      #ifdef SHADING
        float dx = length(texture2D(uTexture,vR).rgb) - length(texture2D(uTexture,vL).rgb);
        float dy = length(texture2D(uTexture,vT).rgb) - length(texture2D(uTexture,vB).rgb);
        c *= clamp(dot(normalize(vec3(dx,dy,length(texelSize))), vec3(0,0,1)) + 0.7, 0.7, 1.0);
      #endif
      gl_FragColor = vec4(c, max(c.r, max(c.g, c.b)));
    }`;

  const splatFS = compileShader(gl.FRAGMENT_SHADER, `
    precision highp float; precision highp sampler2D;
    varying vec2 vUv; uniform sampler2D uTarget;
    uniform float aspectRatio, radius; uniform vec3 color; uniform vec2 point;
    void main () {
      vec2 p = vUv - point.xy; p.x *= aspectRatio;
      gl_FragColor = vec4(texture2D(uTarget,vUv).xyz + exp(-dot(p,p)/radius)*color, 1.0);
    }`);

  const advectionFS = compileShader(gl.FRAGMENT_SHADER, `
    precision highp float; precision highp sampler2D;
    varying vec2 vUv; uniform sampler2D uVelocity, uSource;
    uniform vec2 texelSize, dyeTexelSize; uniform float dt, dissipation;
    vec4 bilerp(sampler2D s, vec2 uv, vec2 ts) {
      vec2 st = uv/ts-0.5, iuv = floor(st), fuv = fract(st);
      return mix(mix(texture2D(s,(iuv+vec2(.5,.5))*ts),texture2D(s,(iuv+vec2(1.5,.5))*ts),fuv.x),
                 mix(texture2D(s,(iuv+vec2(.5,1.5))*ts),texture2D(s,(iuv+vec2(1.5,1.5))*ts),fuv.x),fuv.y);
    }
    void main () {
      #ifdef MANUAL_FILTERING
        vec2 coord = vUv - dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;
        vec4 result = bilerp(uSource, coord, dyeTexelSize);
      #else
        vec2 coord = vUv - dt*texture2D(uVelocity,vUv).xy*texelSize;
        vec4 result = texture2D(uSource, coord);
      #endif
      gl_FragColor = result / (1.0 + dissipation*dt);
    }`, ext.supportLinearFiltering ? null : ['MANUAL_FILTERING']);

  const divergenceFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv, vL, vR, vT, vB; uniform sampler2D uVelocity;
    void main () {
      float L=texture2D(uVelocity,vL).x, R=texture2D(uVelocity,vR).x;
      float T=texture2D(uVelocity,vT).y, B=texture2D(uVelocity,vB).y;
      vec2 C=texture2D(uVelocity,vUv).xy;
      if(vL.x<0.0)L=-C.x; if(vR.x>1.0)R=-C.x; if(vT.y>1.0)T=-C.y; if(vB.y<0.0)B=-C.y;
      gl_FragColor = vec4(0.5*(R-L+T-B), 0.0, 0.0, 1.0);
    }`);

  const curlFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv, vL, vR, vT, vB; uniform sampler2D uVelocity;
    void main () {
      gl_FragColor = vec4(0.5*(texture2D(uVelocity,vR).y-texture2D(uVelocity,vL).y
                             -texture2D(uVelocity,vT).x+texture2D(uVelocity,vB).x), 0.0, 0.0, 1.0);
    }`);

  const vorticityFS = compileShader(gl.FRAGMENT_SHADER, `
    precision highp float; precision highp sampler2D;
    varying vec2 vUv, vL, vR, vT, vB; uniform sampler2D uVelocity, uCurl;
    uniform float curl, dt;
    void main () {
      float L=texture2D(uCurl,vL).x, R=texture2D(uCurl,vR).x;
      float T=texture2D(uCurl,vT).x, B=texture2D(uCurl,vB).x, C=texture2D(uCurl,vUv).x;
      vec2 force = 0.5*vec2(abs(T)-abs(B), abs(R)-abs(L));
      force = force/(length(force)+0.0001) * curl * C;
      force.y *= -1.0;
      vec2 vel = texture2D(uVelocity,vUv).xy + force*dt;
      gl_FragColor = vec4(clamp(vel, -1000.0, 1000.0), 0.0, 1.0);
    }`);

  const pressureFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv, vL, vR, vT, vB; uniform sampler2D uPressure, uDivergence;
    void main () {
      gl_FragColor = vec4((texture2D(uPressure,vL).x+texture2D(uPressure,vR).x
                          +texture2D(uPressure,vB).x+texture2D(uPressure,vT).x
                          -texture2D(uDivergence,vUv).x)*0.25, 0.0, 0.0, 1.0);
    }`);

  const gradSubFS = compileShader(gl.FRAGMENT_SHADER, `
    precision mediump float; precision mediump sampler2D;
    varying highp vec2 vUv, vL, vR, vT, vB; uniform sampler2D uPressure, uVelocity;
    void main () {
      vec2 vel = texture2D(uVelocity,vUv).xy;
      vel -= vec2(texture2D(uPressure,vR).x-texture2D(uPressure,vL).x,
                  texture2D(uPressure,vT).x-texture2D(uPressure,vB).x);
      gl_FragColor = vec4(vel, 0.0, 1.0);
    }`);

  const blit = (() => {
    const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), gl.STATIC_DRAW);
    const ebo = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ebo);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), gl.STATIC_DRAW);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(0);
    return (target, clear = false) => {
      if (!target) { gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight); gl.bindFramebuffer(gl.FRAMEBUFFER, null); }
      else { gl.viewport(0,0,target.width,target.height); gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo); }
      if (clear) { gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
      gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
    };
  })();

  let dye, velocity, divergence, curl, pressure;
  const copyProg     = new Program(baseVS, copyFS);
  const clearProg    = new Program(baseVS, clearFS);
  const splatProg    = new Program(baseVS, splatFS);
  const advProg      = new Program(baseVS, advectionFS);
  const divProg      = new Program(baseVS, divergenceFS);
  const curlProg     = new Program(baseVS, curlFS);
  const vortProg     = new Program(baseVS, vorticityFS);
  const presProg     = new Program(baseVS, pressureFS);
  const gradProg     = new Program(baseVS, gradSubFS);
  const displayMat   = new Material(baseVS, displayFSSrc);

  function createFBO(w, h, internalFormat, format, type, param) {
    gl.activeTexture(gl.TEXTURE0);
    const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, param);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, param);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);
    const fbo = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.viewport(0,0,w,h); gl.clear(gl.COLOR_BUFFER_BIT);
    return { texture: tex, fbo, width: w, height: h, texelSizeX: 1/w, texelSizeY: 1/h,
      attach(id) { gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; } };
  }

  function createDoubleFBO(w, h, iF, f, t, p) {
    const a = createFBO(w,h,iF,f,t,p), b = createFBO(w,h,iF,f,t,p);
    return { width:w, height:h, texelSizeX:a.texelSizeX, texelSizeY:a.texelSizeY, read:a, write:b,
      swap() { const tmp=this.read; this.read=this.write; this.write=tmp; } };
  }

  function resizeFBO(target, w, h, iF, f, t, p) {
    const n = createFBO(w,h,iF,f,t,p);
    copyProg.bind(); if (copyProg.uniforms.uTexture) gl.uniform1i(copyProg.uniforms.uTexture, target.attach(0));
    blit(n); return n;
  }

  function resizeDoubleFBO(target, w, h, iF, f, t, p) {
    if (target.width===w && target.height===h) return target;
    target.read = resizeFBO(target.read, w, h, iF, f, t, p);
    target.write = createFBO(w,h,iF,f,t,p);
    target.width=w; target.height=h; target.texelSizeX=1/w; target.texelSizeY=1/h;
    return target;
  }

  function initFramebuffers() {
    const sim = getResolution(config.SIM_RESOLUTION), dye_ = getResolution(config.DYE_RESOLUTION);
    const tt = ext.halfFloatTexType, rgba = ext.formatRGBA, rg = ext.formatRG, r = ext.formatR;
    const filt = ext.supportLinearFiltering ? gl.LINEAR : gl.NEAREST;
    gl.disable(gl.BLEND);
    dye      = dye      ? resizeDoubleFBO(dye,      dye_.width, dye_.height, rgba.internalFormat, rgba.format, tt, filt)
                        : createDoubleFBO(dye_.width, dye_.height, rgba.internalFormat, rgba.format, tt, filt);
    velocity = velocity ? resizeDoubleFBO(velocity,  sim.width,  sim.height,  rg.internalFormat,   rg.format,   tt, filt)
                        : createDoubleFBO(sim.width,  sim.height,  rg.internalFormat,   rg.format,   tt, filt);
    divergence = createFBO(sim.width, sim.height, r.internalFormat, r.format, tt, gl.NEAREST);
    curl       = createFBO(sim.width, sim.height, r.internalFormat, r.format, tt, gl.NEAREST);
    pressure   = createDoubleFBO(sim.width, sim.height, r.internalFormat, r.format, tt, gl.NEAREST);
  }

  function getResolution(res) {
    const w = gl.drawingBufferWidth, h = gl.drawingBufferHeight;
    const ar = w/h, asp = ar<1 ? 1/ar : ar;
    const mn = Math.round(res), mx = Math.round(res*asp);
    return w>h ? {width:mx, height:mn} : {width:mn, height:mx};
  }

  function scaleByPixelRatio(n) { return Math.floor(n * (window.devicePixelRatio || 1)); }

  displayMat.setKeywords(config.SHADING ? ['SHADING'] : []);
  initFramebuffers();

  let lastTime = Date.now(), colorTimer = 0;

  function updateFrame() {
    const dt = calcDt();
    if (resizeCanvas()) initFramebuffers();
    colorTimer += dt * config.COLOR_UPDATE_SPEED;
    if (colorTimer >= 1) { colorTimer = colorTimer % 1; pointers.forEach(p => { p.color = generateColor(); }); }
    pointers.forEach(p => { if (p.moved) { p.moved = false; splatPointer(p); } });
    step(dt); render(); requestAnimationFrame(updateFrame);
  }

  function calcDt() {
    const now = Date.now(), dt = Math.min((now - lastTime) / 1000, 0.016666);
    lastTime = now; return dt;
  }

  function resizeCanvas() {
    const w = scaleByPixelRatio(canvas.clientWidth), h = scaleByPixelRatio(canvas.clientHeight);
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; return true; }
    return false;
  }

  function step(dt) {
    gl.disable(gl.BLEND);

    curlProg.bind();
    if (curlProg.uniforms.texelSize) gl.uniform2f(curlProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (curlProg.uniforms.uVelocity) gl.uniform1i(curlProg.uniforms.uVelocity, velocity.read.attach(0));
    blit(curl);

    vortProg.bind();
    if (vortProg.uniforms.texelSize) gl.uniform2f(vortProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (vortProg.uniforms.uVelocity) gl.uniform1i(vortProg.uniforms.uVelocity, velocity.read.attach(0));
    if (vortProg.uniforms.uCurl)     gl.uniform1i(vortProg.uniforms.uCurl, curl.attach(1));
    if (vortProg.uniforms.curl)      gl.uniform1f(vortProg.uniforms.curl, config.CURL);
    if (vortProg.uniforms.dt)        gl.uniform1f(vortProg.uniforms.dt, dt);
    blit(velocity.write); velocity.swap();

    divProg.bind();
    if (divProg.uniforms.texelSize)  gl.uniform2f(divProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (divProg.uniforms.uVelocity)  gl.uniform1i(divProg.uniforms.uVelocity, velocity.read.attach(0));
    blit(divergence);

    clearProg.bind();
    if (clearProg.uniforms.uTexture) gl.uniform1i(clearProg.uniforms.uTexture, pressure.read.attach(0));
    if (clearProg.uniforms.value)    gl.uniform1f(clearProg.uniforms.value, config.PRESSURE);
    blit(pressure.write); pressure.swap();

    presProg.bind();
    if (presProg.uniforms.texelSize)   gl.uniform2f(presProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (presProg.uniforms.uDivergence) gl.uniform1i(presProg.uniforms.uDivergence, divergence.attach(0));
    for (let i = 0; i < config.PRESSURE_ITERATIONS; i++) {
      if (presProg.uniforms.uPressure) gl.uniform1i(presProg.uniforms.uPressure, pressure.read.attach(1));
      blit(pressure.write); pressure.swap();
    }

    gradProg.bind();
    if (gradProg.uniforms.texelSize)  gl.uniform2f(gradProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (gradProg.uniforms.uPressure)  gl.uniform1i(gradProg.uniforms.uPressure, pressure.read.attach(0));
    if (gradProg.uniforms.uVelocity)  gl.uniform1i(gradProg.uniforms.uVelocity, velocity.read.attach(1));
    blit(velocity.write); velocity.swap();

    advProg.bind();
    if (advProg.uniforms.texelSize) gl.uniform2f(advProg.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
    if (!ext.supportLinearFiltering && advProg.uniforms.dyeTexelSize) gl.uniform2f(advProg.uniforms.dyeTexelSize, velocity.texelSizeX, velocity.texelSizeY);
    const vid = velocity.read.attach(0);
    if (advProg.uniforms.uVelocity)   gl.uniform1i(advProg.uniforms.uVelocity, vid);
    if (advProg.uniforms.uSource)     gl.uniform1i(advProg.uniforms.uSource, vid);
    if (advProg.uniforms.dt)          gl.uniform1f(advProg.uniforms.dt, dt);
    if (advProg.uniforms.dissipation) gl.uniform1f(advProg.uniforms.dissipation, config.VELOCITY_DISSIPATION);
    blit(velocity.write); velocity.swap();

    if (!ext.supportLinearFiltering && advProg.uniforms.dyeTexelSize) gl.uniform2f(advProg.uniforms.dyeTexelSize, dye.texelSizeX, dye.texelSizeY);
    if (advProg.uniforms.uVelocity)   gl.uniform1i(advProg.uniforms.uVelocity, velocity.read.attach(0));
    if (advProg.uniforms.uSource)     gl.uniform1i(advProg.uniforms.uSource, dye.read.attach(1));
    if (advProg.uniforms.dissipation) gl.uniform1f(advProg.uniforms.dissipation, config.DENSITY_DISSIPATION);
    blit(dye.write); dye.swap();
  }

  function render() {
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA); gl.enable(gl.BLEND);
    const w = gl.drawingBufferWidth, h = gl.drawingBufferHeight;
    displayMat.bind();
    if (config.SHADING && displayMat.uniforms.texelSize) gl.uniform2f(displayMat.uniforms.texelSize, 1/w, 1/h);
    if (displayMat.uniforms.uTexture) gl.uniform1i(displayMat.uniforms.uTexture, dye.read.attach(0));
    blit(null);
  }

  function splat(x, y, dx, dy, color) {
    splatProg.bind();
    if (splatProg.uniforms.uTarget)     gl.uniform1i(splatProg.uniforms.uTarget, velocity.read.attach(0));
    if (splatProg.uniforms.aspectRatio) gl.uniform1f(splatProg.uniforms.aspectRatio, canvas.width/canvas.height);
    if (splatProg.uniforms.point)       gl.uniform2f(splatProg.uniforms.point, x, y);
    if (splatProg.uniforms.color)       gl.uniform3f(splatProg.uniforms.color, dx, dy, 0);
    if (splatProg.uniforms.radius) {
      let r = config.SPLAT_RADIUS / 100;
      if (canvas.width/canvas.height > 1) r *= canvas.width/canvas.height;
      gl.uniform1f(splatProg.uniforms.radius, r);
    }
    blit(velocity.write); velocity.swap();
    if (splatProg.uniforms.uTarget) gl.uniform1i(splatProg.uniforms.uTarget, dye.read.attach(0));
    if (splatProg.uniforms.color)   gl.uniform3f(splatProg.uniforms.color, color.r, color.g, color.b);
    blit(dye.write); dye.swap();
  }

  function splatPointer(p) {
    splat(p.texcoordX, p.texcoordY, p.deltaX * config.SPLAT_FORCE, p.deltaY * config.SPLAT_FORCE, p.color);
  }

  function clickSplat(p) {
    const c = generateColor(); c.r *= 10; c.g *= 10; c.b *= 10;
    splat(p.texcoordX, p.texcoordY, 10*(Math.random()-0.5), 30*(Math.random()-0.5), c);
  }

  function generateColor() {
    const c = HSVtoRGB(Math.random(), 1, 1);
    return { r: c.r*0.15, g: c.g*0.15, b: c.b*0.15 };
  }

  function HSVtoRGB(h, s, v) {
    const i = Math.floor(h*6), f = h*6-i, p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
    const cases = [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]];
    const [r,g,b] = cases[i%6]; return {r,g,b};
  }

  function movePtrDown(ptr, id, px, py) {
    ptr.id=id; ptr.down=true; ptr.moved=false;
    ptr.texcoordX=px/canvas.width; ptr.texcoordY=1-py/canvas.height;
    ptr.prevTexcoordX=ptr.texcoordX; ptr.prevTexcoordY=ptr.texcoordY;
    ptr.deltaX=0; ptr.deltaY=0; ptr.color=generateColor();
  }

  function movePtrMove(ptr, px, py, color) {
    ptr.prevTexcoordX=ptr.texcoordX; ptr.prevTexcoordY=ptr.texcoordY;
    ptr.texcoordX=px/canvas.width; ptr.texcoordY=1-py/canvas.height;
    const ar = canvas.width/canvas.height;
    ptr.deltaX = (ptr.texcoordX-ptr.prevTexcoordX) * (ar<1 ? ar : 1);
    ptr.deltaY = (ptr.texcoordY-ptr.prevTexcoordY) / (ar>1 ? ar : 1);
    ptr.moved = Math.abs(ptr.deltaX)>0 || Math.abs(ptr.deltaY)>0;
    ptr.color = color;
  }

  // Events
  window.addEventListener('mousedown', e => {
    const p = pointers[0], px = scaleByPixelRatio(e.clientX), py = scaleByPixelRatio(e.clientY);
    movePtrDown(p, -1, px, py); clickSplat(p);
  });

  const firstMove = e => {
    const p = pointers[0];
    movePtrMove(p, scaleByPixelRatio(e.clientX), scaleByPixelRatio(e.clientY), generateColor());
    updateFrame();
    document.body.removeEventListener('mousemove', firstMove);
  };
  document.body.addEventListener('mousemove', firstMove);

  window.addEventListener('mousemove', e => {
    const p = pointers[0];
    movePtrMove(p, scaleByPixelRatio(e.clientX), scaleByPixelRatio(e.clientY), p.color);
  });

  const firstTouch = e => {
    const p = pointers[0], t = e.targetTouches[0];
    movePtrDown(p, t.identifier, scaleByPixelRatio(t.clientX), scaleByPixelRatio(t.clientY));
    updateFrame();
    document.body.removeEventListener('touchstart', firstTouch);
  };
  document.body.addEventListener('touchstart', firstTouch);

  window.addEventListener('touchstart', e => {
    const p = pointers[0], t = e.targetTouches[0];
    movePtrDown(p, t.identifier, scaleByPixelRatio(t.clientX), scaleByPixelRatio(t.clientY));
  }, false);

  window.addEventListener('touchmove', e => {
    const p = pointers[0], t = e.targetTouches[0];
    movePtrMove(p, scaleByPixelRatio(t.clientX), scaleByPixelRatio(t.clientY), p.color);
  }, false);

  window.addEventListener('touchend', () => { pointers[0].down = false; });
})();
</script>
</body>
</html>
